name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "examples/web_scanner/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stamp build ID
        run: |
          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          sed -i "s/__BUILD_ID__/${SHORT_SHA}/g" examples/web_scanner/app.js
          sed -i "s/__BUILD_ID__/${SHORT_SHA}/g" examples/web_scanner/index.html
          echo "Stamped build ID: ${SHORT_SHA}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/web_scanner

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
