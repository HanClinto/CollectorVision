<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CollectorVision Applet Example</title>
    <style>
      :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color-scheme: light dark; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; background: #f8f6ee; color: #24211f; }
      main { width: min(32rem, 100%); display: grid; gap: 1rem; }
      h1 { margin: 0; font-size: clamp(2rem, 8vw, 4rem); line-height: 0.95; }
      code, pre { border-radius: 0.75rem; background: rgba(36, 33, 31, 0.08); }
      code { padding: 0.1rem 0.25rem; }
      pre { overflow: auto; margin: 0; padding: 1rem; }
      #events { min-height: 5rem; }
      @media (prefers-color-scheme: dark) { body { background: #0f172a; color: #e2e8f0; } code, pre { background: rgba(226, 232, 240, 0.08); } }
    </style>
  </head>
  <body>
    <main>
      <div>
        <p><strong>Candidate API</strong></p>
        <h1>Scanner applet</h1>
        <p>Add one target element, pass a JSON config object, and listen for card events.</p>
      </div>

      <div id="collectorvision"></div>
      <pre id="events">Waiting for cards…</pre>
    </main>

    <script type="module">
      import { createCollectorVisionScannerApplet } from "./lib/collectorvision-scanner-applet.mjs";

      const events = document.getElementById("events");

      const scanner = await createCollectorVisionScannerApplet({
        target: "#collectorvision",
        matchThreshold: 0.60,
        consecutiveMatches: 2,
        scanIntervalMs: 900,
        overlay: true,
        enableWebGpu: false,
        onCardDetected(card) {
          events.textContent = JSON.stringify({
            type: "cardDetected",
            cardId: card.cardId,
            score: card.score,
            detectedAt: card.detectedAt,
          }, null, 2);
        },
        onError(error) {
          events.textContent = `Scanner error: ${error.message}`;
        },
      });

      window.collectorVisionScanner = scanner;
    </script>
  </body>
</html>
