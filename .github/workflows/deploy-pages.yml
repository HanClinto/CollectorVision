name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "examples/web_scanner/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared web scanner assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_NAME="$(python - <<'PY'
          import json
          with open("examples/web_scanner/assets.bundle.json", "r", encoding="utf-8") as f:
              print(json.load(f)["release"])
          PY
          )"
          mkdir -p /tmp/web-scanner-assets
          gh release download "$RELEASE_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "web-scanner-assets.tar.zst" \
            --pattern "web-scanner-assets-metadata.json" \
            --dir /tmp/web-scanner-assets
          rm -rf examples/web_scanner/assets examples/web_scanner/vendor examples/web_scanner/bundle-metadata.json
          tar --zstd -xf /tmp/web-scanner-assets/web-scanner-assets.tar.zst -C examples/web_scanner

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stamp build ID
        run: |
          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          sed -i "s/__BUILD_ID__/${SHORT_SHA}/g" examples/web_scanner/app.js
          sed -i "s/__BUILD_ID__/${SHORT_SHA}/g" examples/web_scanner/index.html
          echo "Stamped build ID: ${SHORT_SHA}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/web_scanner

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
